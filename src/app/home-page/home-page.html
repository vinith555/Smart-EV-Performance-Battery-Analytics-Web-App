<nav
  class="fixed top-0 left-0 right-0 z-50 h-[70px] bg-[#00712D] flex items-center justify-between px-6"
>
  <h1
    class="text-[#D5ED9F] text-3xl hover:scale-105 transition duration-300 cursor-pointer"
  >
    Smart EV
  </h1>

  <div class="hidden md:flex gap-x-4 text-[#D5ED9F]">
    <a
      routerLink="/"
      class="hover:bg-[#D5ED9F] hover:text-black px-2 py-1 rounded"
      >Home</a
    >
    <a
      routerLink="/about"
      class="hover:bg-[#D5ED9F] hover:text-black px-2 py-1 rounded"
      >About</a
    >
    <a
      routerLink="/contact"
      class="hover:bg-[#D5ED9F] hover:text-black px-2 py-1 rounded"
      >Contact</a
    >
  </div>

  <!-- Right Side -->
  <div class="flex items-center gap-x-4">
    <!-- Hamburger -->
    <button
      class="md:hidden text-[#D5ED9F] text-3xl hover:scale-110 transition duration-300"
      (click)="toggleMenu()"
    >
      <i class="fa-solid fa-bars"></i>
    </button>

    <!-- User Icon (Desktop only) -->
    <div class="hidden md:block relative">
      <button
        *ngIf="isLoggedIn"
        (click)="goToProfile()"
        class="text-2xl text-[#D5ED9F] hover:scale-110 transition duration-300"
        title="Go to Profile"
      >
        <i class="far fa-user-circle"></i>
      </button>

      <button
        *ngIf="!isLoggedIn"
        (click)="toggleUserDropdown()"
        (mouseenter)="isUserDropdownOpen = true"
        class="text-2xl text-[#D5ED9F] hover:scale-110 transition duration-300"
        title="User Menu"
      >
        <i class="far fa-user-circle"></i>
      </button>

      <!-- Dropdown Menu -->
      <div
        *ngIf="!isLoggedIn && isUserDropdownOpen"
        (mouseenter)="isUserDropdownOpen = true"
        (mouseleave)="isUserDropdownOpen = false"
        class="absolute right-0 mt-2 w-48 bg-[#00712D] rounded-lg shadow-lg z-50 border border-[#D5ED9F]"
      >
        <a
          routerLink="/login"
          (click)="closeUserDropdown()"
          class="block px-4 py-3 text-[#D5ED9F] hover:bg-[#D5ED9F] hover:text-black rounded-t-lg transition"
        >
          <i class="fas fa-sign-in mr-2"></i>Login
        </a>
        <a
          routerLink="/help-support"
          (click)="closeUserDropdown()"
          class="block px-4 py-3 text-[#D5ED9F] hover:bg-[#D5ED9F] hover:text-black rounded-b-lg transition border-t border-[#D5ED9F]"
        >
          <i class="far fa-question-circle mr-2"></i>Help & Support
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- Mobile / Tablet Menu -->
<div
  *ngIf="isMenuOpen"
  class="fixed top-[70px] right-0 w-52 bg-[#00712D] flex flex-col text-[#D5ED9F] shadow-lg z-40"
>
  <a
    routerLink="/"
    (click)="closeMenu()"
    class="px-4 py-3 hover:bg-[#D5ED9F] hover:text-black"
    >Home</a
  >

  <a
    routerLink="/about"
    (click)="closeMenu()"
    class="px-4 py-3 hover:bg-[#D5ED9F] hover:text-black"
    >About</a
  >

  <a
    routerLink="/contact"
    (click)="closeMenu()"
    class="px-4 py-3 hover:bg-[#D5ED9F] hover:text-black"
    >Contact</a
  >

  <a
    routerLink="/login"
    (click)="closeMenu()"
    class="px-4 py-3 hover:bg-[#D5ED9F] hover:text-black"
    >Login</a
  >
</div>

<router-outlet></router-outlet>
