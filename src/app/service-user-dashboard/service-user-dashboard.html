<header
  class="fixed top-0 left-0 right-0 z-10 h-[70px] bg-white shadow-md flex items-center justify-between px-6"
>
  <!-- Left Section -->
  <div class="flex items-center gap-x-6">
    <button
      type="button"
      class="flex items-center justify-center hover:bg-green-600 text-gray-600 hover:text-white rounded p-2 transition duration-300 hover:scale-110"
      (click)="toggleNavbar()"
    >
      <i class="fa-solid fa-bars text-xl"></i>
    </button>

    <a
      routerLink="/service-user-dashboard"
      class="text-2xl font-bold text-gray-800 hover:text-green-600 cursor-pointer transition"
      >EV Service User</a
    >
  </div>

  <!-- Right Section -->
  <div class="flex items-center gap-x-4">
    <button
      type="button"
      class="flex items-center justify-center hover:bg-green-600 text-gray-600 hover:text-white rounded p-2 transition duration-300 hover:scale-110"
      (click)="toggleNotifications()"
    >
      <i class="fa-regular fa-bell text-2xl"></i>
    </button>

    <button
      type="button"
      class="flex items-center justify-center hover:bg-green-600 text-gray-600 hover:text-white rounded p-2 transition duration-300 hover:scale-110"
      (click)="isProfileVisible = !isProfileVisible"
    >
      <i class="fa-regular fa-user text-2xl"></i>
    </button>
  </div>
</header>

<nav
  class="fixed left-0 bottom-0 top-0 mt-[70px] flex flex-col gap-4 p-4 bg-white shadow-md text-lg z-20 transform transition-transform duration-300"
  [class.translate-x-0]="isNavbarCollapsed"
  [class.-translate-x-full]="!isNavbarCollapsed"
>
  <a
    routerLink="/service-user-dashboard"
    routerLinkActive="active-link"
    [routerLinkActiveOptions]="{ exact: true }"
    class="hover:text-green-600 py-1 px-2 rounded-md"
    (click)="toggleNavbar()"
    ><i class="fa-solid fa-home mr-2"></i>Dashboard</a
  >
  <a
    routerLink="./vehicle-info"
    routerLinkActive="active-link"
    class="hover:text-green-600 py-1 px-2 rounded-md"
    (click)="toggleNavbar()"
    ><i class="fa-solid fa-car-burst mr-2"></i>Vehicle Information</a
  >
  <a
    routerLink="./billing"
    routerLinkActive="active-link"
    class="hover:text-green-600 py-1 px-2 rounded-md"
    (click)="toggleNavbar()"
    ><i class="fa-solid fa-file-lines mr-2"></i>Create Bill</a
  >
  <a
    routerLink="/help-support"
    routerLinkActive="active-link"
    class="hover:text-green-600 py-1 px-2 rounded-md"
    (click)="toggleNavbar()"
    ><i class="fa-solid fa-headset mr-2"></i> Help & Support</a
  >
</nav>
<div
  class="fixed inset-0 top-[70px] bg-black transition-opacity duration-300 z-10"
  [class.opacity-50]="isNavbarCollapsed"
  [class.opacity-0]="!isNavbarCollapsed"
  [class.pointer-events-none]="!isNavbarCollapsed"
  (click)="toggleNavbar()"
></div>

<div
  *ngIf="isNotificationsVisible"
  class="flex flex-col gap-y-3 fixed top-[90px] right-6 w-96 max-h-[500px] overflow-y-auto bg-gradient-to-br from-white to-gray-50 shadow-2xl rounded-2xl p-6 z-30 border border-gray-100 animate-fade-in"
>
  <div class="flex justify-between items-center pb-4 border-b border-gray-200">
    <div class="flex items-center gap-3">
      <div class="bg-green-100 rounded-full p-2.5">
        <i class="fa-regular fa-bell text-green-600 text-lg"></i>
      </div>
      <h2 class="font-bold text-gray-900 text-lg">Notifications</h2>
    </div>
    <button
      (click)="toggleNotifications()"
      class="text-gray-400 hover:text-red-500 hover:scale-110 transition duration-300 rounded-lg hover:bg-red-50 p-2"
      title="Close"
    >
      <i class="fa-solid fa-xmark text-xl"></i>
    </button>
  </div>
  <div class="flex flex-col gap-3">
    <p
      *ngIf="notifications.length === 0"
      class="text-sm text-gray-500 text-center py-8"
    >
      No notifications yet
    </p>
    <div
      *ngFor="let n of notifications"
      class="text-sm text-gray-700 hover:text-green-600 hover:bg-green-50 rounded-xl px-4 py-3 transition duration-300 border border-transparent hover:border-green-200 cursor-pointer group"
    >
      <div class="flex items-start gap-3 w-full">
        <div
          [ngClass]="{
            'text-green-600': n.priority === 'LOW',
            'text-yellow-600': n.priority === 'MEDIUM',
            'text-red-600': n.priority === 'HIGH',
          }"
          class="mt-0.5 group-hover:scale-110 transition flex-shrink-0"
        >
          <i
            [ngClass]="{
              'fa-circle-check': n.priority === 'LOW',
              'fa-exclamation-circle': n.priority === 'MEDIUM',
              'fa-triangle-exclamation': n.priority === 'HIGH',
            }"
            class="fa-solid text-sm"
          ></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="break-words">{{ n.message }}</p>
          <p class="text-xs text-gray-400 mt-1">
            {{ n.priority }}
          </p>
        </div>
        <button
          type="button"
          (click)="deleteNotification(n.notification_id, $event)"
          class="flex-shrink-0 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg p-2 transition duration-300"
          title="Delete notification"
        >
          <i class="fa-solid fa-trash-can text-sm"></i>
        </button>
      </div>
    </div>
  </div>
</div>
<div
  *ngIf="isNotificationsVisible"
  class="fixed inset-0 top-[70px] z-20 bg-black/30 backdrop-blur-sm animate-fade-in"
  (click)="toggleNotifications()"
></div>

<div
  *ngIf="isProfileVisible"
  class="flex flex-col gap-y-1 fixed top-[90px] right-6 w-72 bg-gradient-to-br from-white to-gray-50 shadow-2xl rounded-2xl p-6 z-30 border border-gray-100 animate-fade-in"
>
  <!-- Profile Header -->
  <div class="flex gap-x-4 items-center mb-6 pb-6 border-b border-gray-200">
    <div class="relative">
      <div
        class="border-4 border-green-200 h-14 w-14 rounded-full bg-gradient-to-br from-green-100 to-green-200 flex items-center justify-center hover:scale-110 transition duration-300 cursor-pointer"
      >
        <i class="fa-solid fa-user text-green-700 text-lg"></i>
      </div>
      <div
        class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 rounded-full border-2 border-white"
      ></div>
    </div>
    <div class="flex flex-col flex-1">
      <h3 class="font-bold text-gray-900 text-base">{{ userName }}</h3>
      <p class="text-gray-500 text-xs font-medium uppercase tracking-wider">
        {{ userRole }}
      </p>
    </div>
  </div>

  <!-- Menu Items -->
  <a
    routerLink="/profile"
    (click)="isProfileVisible = false"
    class="flex items-center gap-3 text-gray-700 hover:text-green-600 hover:bg-green-50 py-3 px-4 rounded-xl transition duration-300 group"
  >
    <i
      class="fa-solid fa-user-pen text-lg group-hover:scale-110 transition"
    ></i>
    <span class="font-medium">Profile Settings</span>
  </a>
  <a
    href=""
    class="flex items-center gap-3 text-gray-700 hover:text-green-600 hover:bg-green-50 py-3 px-4 rounded-xl transition duration-300 group"
  >
    <i class="fa-solid fa-key text-lg group-hover:scale-110 transition"></i>
    <span class="font-medium">Change Password</span>
  </a>

  <!-- Logout Button -->
  <button
    (click)="logout()"
    class="flex items-center gap-3 text-gray-700 hover:text-red-600 hover:bg-red-50 py-3 px-4 rounded-xl transition duration-300 group mt-2 border border-transparent hover:border-red-200 w-full"
  >
    <i
      class="fa-solid fa-right-from-bracket text-lg group-hover:scale-110 transition"
    ></i>
    <span class="font-medium">Logout</span>
  </button>
</div>
<div
  *ngIf="isProfileVisible"
  class="fixed inset-0 top-[70px] z-20 bg-black/30 backdrop-blur-sm animate-fade-in"
  (click)="isProfileVisible = false"
></div>

<div class="mt-[70px] p-4">
  <router-outlet></router-outlet>
</div>
