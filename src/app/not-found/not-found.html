<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100"
>
  <div class="text-center px-4">
    <!-- 404 Icon -->
    <div class="mb-8">
      <i
        class="fas fa-exclamation-triangle text-9xl text-slate-300 animate-pulse"
      ></i>
    </div>

    <!-- 404 Text -->
    <h1 class="text-8xl font-bold text-slate-800 mb-4">404</h1>
    <h2 class="text-3xl font-semibold text-slate-700 mb-4">Page Not Found</h2>
    <p class="text-slate-600 text-lg mb-8 max-w-md mx-auto">
      The page you're looking for doesn't exist or you don't have permission to
      access it.
    </p>

    <!-- Action Buttons -->
    <div class="flex gap-4 justify-center">
      <button
        (click)="goBack()"
        class="px-6 py-3 bg-slate-600 text-white rounded-lg hover:bg-slate-700 transition duration-300 flex items-center gap-2"
      >
        <i class="fas fa-arrow-left"></i>
        Go Back
      </button>
      <button
        (click)="goHome()"
        class="px-6 py-3 bg-[#00712D] text-white rounded-lg hover:bg-[#005a24] transition duration-300 flex items-center gap-2"
      >
        <i class="fas fa-home"></i>
        Go Home
      </button>
    </div>

    <!-- Additional Help -->
    <div class="mt-12">
      <p class="text-slate-500 text-sm mb-2">Need help?</p>
      <a
        routerLink="/help-support"
        class="text-[#00712D] hover:underline font-semibold"
      >
        Contact Support
      </a>
    </div>
  </div>
</div>
